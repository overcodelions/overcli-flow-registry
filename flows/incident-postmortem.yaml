name: "Incident postmortem from notes"
description: "Convert raw incident notes and timeline into a structured postmortem document"
input: user_prompt
default_prompt: |-
  Write a postmortem for this incident:

  <paste incident summary or link here>
participants:
  - id: primary
    name: Primary
    backend: claude
    model: claude-opus-4-7
    kind: primary
steps:
  - id: write
    participant: primary
    role: planner
    inputs: [user_prompt]
    tools: [Read, Grep, Glob]
    output: postmortem.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [operations, docs, infra, claude]

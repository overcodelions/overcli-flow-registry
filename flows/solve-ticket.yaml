name: "Solve a ticket end-to-end"
description: "Fetch a Jira ticket, design a plan, implement code (Codex preferred, Claude fallback), review with auto-bounce on failure, write tests, then open a PR for final approval. Automatically selects best available backend for your environment."
input: user_prompt
default_prompt: |-
  Solve this ticket:

  <paste ticket key or URL here>
participants:
  - id: primary
    name: Claude haiku 4 5
    backend: claude
    model: claude-haiku-4-5
    kind: primary
  - id: model_2
    name: Claude opus 4 7
    backend: claude
    model: claude-opus-4-7
  - id: model_3
    name: codex:gpt-5.4-mini
    backend: codex
    model: gpt-5.4-mini
  - id: model_4
    name: Claude sonnet 4 6
    backend: claude
    model: claude-sonnet-4-6
steps:
  - id: fetch
    participant: primary
    role: researcher
    inputs: [user_prompt]
    tools: [mcp:atlassian]
    output: ticket.md
  - id: plan
    participant: model_2
    role: planner
    inputs: [ticket.md]
    tools: [Read, Grep, Glob]
    output: plan.md
  - id: build
    participant: model_3
    role: implementer
    inputs: [plan.md]
    tools: [read_file, list_dir, grep, write_file, edit_file]
    output: diff
  - id: review
    participant: model_2
    role: reviewer
    inputs: [plan.md, diff]
    tools: [Read, Grep, Glob, Bash]
    on_fail:
      action: goto
      target: build
      max_retries: 2
    output: review.md
  - id: tests
    participant: model_3
    role: test-writer
    inputs: [diff, review.md]
    tools: [read_file, list_dir, grep, write_file, edit_file]
    output: diff
  - id: ship
    participant: model_4
    role: shipper
    inputs: [plan.md, diff, review.md]
    tools: [Bash]
    pause_before: true
    output: pr_url
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [tickets, implementation, mcp-jira, claude, codex]

name: "Architecture Decision Record"
description: "Research existing ADRs + context, design alternatives, draft the ADR, then review for completeness"
input: user_prompt
default_prompt: |-
  Write an ADR for this decision:

  <describe the decision here>
participants:
  - id: primary
    name: Claude sonnet 4 6
    backend: claude
    model: claude-sonnet-4-6
    kind: primary
  - id: model_2
    name: Claude opus 4 7
    backend: claude
    model: claude-opus-4-7
  - id: model_3
    name: codex:gpt-5.4-mini
    backend: codex
    model: gpt-5.4-mini
steps:
  - id: research
    participant: primary
    role: researcher
    inputs: [user_prompt]
    tools: [Read, Grep, Glob]
    output: research.md
  - id: design
    participant: model_2
    role: planner
    inputs: [user_prompt, research.md]
    tools: [Read, Grep, Glob]
    output: design.md
  - id: draft
    participant: model_3
    role: technical-writer
    inputs: [design.md]
    tools: [read_file, write_file]
    permission_mode: acceptEdits
    output: draft.md
  - id: review
    participant: model_2
    role: reviewer
    inputs: [design.md, draft.md]
    tools: [Read]
    output: adr.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [design, docs, claude, codex]

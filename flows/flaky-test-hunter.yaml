name: Flaky test hunter
description: Gather CI logs, identify flaky tests, diagnose causes, then draft fixes
input: user_prompt
steps:
  - id: gather
    model: { backend: claude, model: claude-sonnet-4-6 }
    role: researcher
    inputs: [user_prompt]
    tools: [Bash, Read, Grep]
    output: logs.md

  - id: identify
    model: { backend: claude, model: claude-opus-4-7 }
    role: debugger
    inputs: [logs.md]
    tools: [Bash, Read, Grep, Glob]
    output: flakes.md

  - id: diagnose
    model: { backend: claude, model: claude-opus-4-7 }
    role: debugger
    inputs: [flakes.md]
    tools: [Read, Grep, Glob]
    output: diagnosis.md

  - id: propose-fix
    model: { backend: codex, model: gpt-5.4-mini }
    role: implementer
    inputs: [diagnosis.md]
    tools: [read_file, list_dir, grep, write_file, edit_file]
    permission_mode: acceptEdits
    output: report.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [testing, ci, debugging, claude, codex]

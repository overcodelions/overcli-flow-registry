name: "Flaky test hunter"
description: "Gather CI logs, identify flaky tests, diagnose causes, then draft fixes"
input: user_prompt
default_prompt: "Find flaky tests in this repo and propose fixes."
participants:
  - id: primary
    name: Claude sonnet 4 6
    backend: claude
    model: claude-sonnet-4-6
    kind: primary
  - id: model_2
    name: Claude opus 4 7
    backend: claude
    model: claude-opus-4-7
  - id: model_3
    name: codex:gpt-5.4-mini
    backend: codex
    model: gpt-5.4-mini
steps:
  - id: gather
    participant: primary
    role: researcher
    inputs: [user_prompt]
    tools: [Bash, Read, Grep]
    output: logs.md
  - id: identify
    participant: model_2
    role: debugger
    inputs: [logs.md]
    tools: [Bash, Read, Grep, Glob]
    output: flakes.md
  - id: diagnose
    participant: model_2
    role: debugger
    inputs: [flakes.md]
    tools: [Read, Grep, Glob]
    output: diagnosis.md
  - id: propose-fix
    participant: model_3
    role: implementer
    inputs: [diagnosis.md]
    tools: [read_file, list_dir, grep, write_file, edit_file]
    permission_mode: acceptEdits
    output: report.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [testing, ci, debugging, claude, codex]

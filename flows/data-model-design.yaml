name: Data model design
description: Research existing schema, design new tables/indexes/constraints, draft DDL, then review for safety
input: user_prompt
steps:
  - id: research
    model: { backend: claude, model: claude-sonnet-4-6 }
    role: researcher
    inputs: [user_prompt]
    tools: [Read, Grep, Glob]
    output: research.md

  - id: design
    model: { backend: claude, model: claude-opus-4-7 }
    role: planner
    inputs: [user_prompt, research.md]
    tools: [Read, Grep, Glob]
    output: design.md

  - id: ddl
    model: { backend: codex, model: gpt-5.4-mini }
    role: implementer
    inputs: [design.md]
    tools: [read_file, write_file, edit_file]
    permission_mode: acceptEdits
    output: ddl.md

  - id: review
    model: { backend: claude, model: claude-opus-4-7 }
    role: reviewer
    inputs: [design.md, ddl.md]
    tools: [Read, Grep, Glob]
    output: model.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [design, data, backend, claude, codex]

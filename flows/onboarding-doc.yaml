name: "Onboarding doc"
description: "Survey the repo, outline an onboarding guide, draft each section, then polish"
input: user_prompt
default_prompt: "Write an onboarding doc for engineers new to this project."
participants:
  - id: primary
    name: Claude sonnet 4 6
    backend: claude
    model: claude-sonnet-4-6
    kind: primary
  - id: model_2
    name: Claude opus 4 7
    backend: claude
    model: claude-opus-4-7
  - id: model_3
    name: codex:gpt-5.4-mini
    backend: codex
    model: gpt-5.4-mini
steps:
  - id: survey
    participant: primary
    role: researcher
    inputs: [user_prompt]
    tools: [Read, Grep, Glob, Bash]
    output: survey.md
  - id: outline
    participant: model_2
    role: planner
    inputs: [survey.md]
    tools: [Read, Grep, Glob]
    output: outline.md
  - id: draft
    participant: model_3
    role: technical-writer
    inputs: [survey.md, outline.md]
    tools: [read_file, write_file]
    permission_mode: acceptEdits
    output: draft.md
  - id: polish
    participant: primary
    role: editor
    inputs: [outline.md, draft.md]
    tools: [Read]
    output: onboarding.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [documentation, docs, repo, claude, codex]

name: "On-call runbook"
description: "Read the incident write-up, extract canonical steps, draft a runbook, then review for completeness"
input: user_prompt
default_prompt: |-
  Write an on-call runbook for:

  <describe the service or alert here>
participants:
  - id: primary
    name: Claude sonnet 4 6
    backend: claude
    model: claude-sonnet-4-6
    kind: primary
  - id: model_2
    name: Claude opus 4 7
    backend: claude
    model: claude-opus-4-7
  - id: model_3
    name: codex:gpt-5.4-mini
    backend: codex
    model: gpt-5.4-mini
steps:
  - id: read
    participant: primary
    role: researcher
    inputs: [user_prompt]
    tools: [Read, WebFetch]
    output: incident.md
  - id: extract
    participant: model_2
    role: planner
    inputs: [incident.md]
    tools: [Read, Grep, Glob]
    output: steps.md
  - id: draft
    participant: model_3
    role: technical-writer
    inputs: [incident.md, steps.md]
    tools: [read_file, write_file]
    permission_mode: acceptEdits
    output: draft.md
  - id: review
    participant: model_2
    role: reviewer
    inputs: [steps.md, draft.md]
    tools: [Read]
    output: runbook.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [operations, docs, infra, claude, codex]

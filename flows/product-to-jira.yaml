name: "Product idea → Jira tickets"
description: Brief the idea, break into epic + stories, draft tickets, then create them in Jira
input: user_prompt
steps:
  - id: brief
    model: { backend: claude, model: claude-opus-4-7 }
    role: planner
    inputs: [user_prompt]
    tools: [Read, Grep, Glob]
    output: brief.md

  - id: breakdown
    model: { backend: claude, model: claude-opus-4-7 }
    role: planner
    inputs: [brief.md]
    tools: [Read, Grep, Glob]
    output: breakdown.md

  - id: draft
    model: { backend: claude, model: claude-sonnet-4-6 }
    role: technical-writer
    inputs: [brief.md, breakdown.md]
    tools: []
    output: tickets-draft.md

  - id: create
    model: { backend: claude, model: claude-haiku-4-5 }
    role: shipper
    inputs: [tickets-draft.md]
    tools: [mcp:atlassian]
    pause_before: true
    output: tickets.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [planning, roadmap, tickets, mcp-jira, claude]

name: "Product idea → Jira tickets"
description: "Turn a freeform product idea or feature brief into a Jira epic with implementation tickets"
input: user_prompt
default_prompt: |-
  Convert this product brief into Jira tickets:

  <paste brief here>
participants:
  - id: primary
    name: Primary
    backend: claude
    model: claude-opus-4-7
    kind: primary
steps:
  - id: brief
    participant: primary
    role: planner
    inputs: [user_prompt]
    tools: [Read, Grep, Glob]
    output: brief.md
  - id: tickets
    participant: primary
    role: planner
    inputs: [brief.md]
    tools: [mcp:atlassian]
    output: tickets.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [planning, roadmap, tickets, mcp-jira, claude]

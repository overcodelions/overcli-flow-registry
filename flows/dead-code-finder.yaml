name: Dead-code finder
description: Scan for unreferenced symbols, verify each candidate is truly dead, then format a deletion plan
input: user_prompt
steps:
  - id: scan
    model: { backend: claude, model: claude-sonnet-4-6 }
    role: researcher
    inputs: [user_prompt]
    tools: [Bash, Read, Grep, Glob]
    output: candidates.md

  - id: verify
    model: { backend: claude, model: claude-opus-4-7 }
    role: reviewer
    inputs: [candidates.md]
    tools: [Bash, Read, Grep, Glob]
    output: verified.md

  - id: format
    model: { backend: claude, model: claude-haiku-4-5 }
    role: technical-writer
    inputs: [verified.md]
    tools: []
    output: report.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [refactor, repo, analysis, claude]

name: "Dead-code finder"
description: "Scan for unreferenced symbols, verify each candidate is truly dead, then format a deletion plan"
input: user_prompt
default_prompt: "Find unused code, exports, and modules in this repo."
participants:
  - id: primary
    name: Claude sonnet 4 6
    backend: claude
    model: claude-sonnet-4-6
    kind: primary
  - id: model_2
    name: Claude opus 4 7
    backend: claude
    model: claude-opus-4-7
  - id: model_3
    name: Claude haiku 4 5
    backend: claude
    model: claude-haiku-4-5
steps:
  - id: scan
    participant: primary
    role: researcher
    inputs: [user_prompt]
    tools: [Bash, Read, Grep, Glob]
    output: candidates.md
  - id: verify
    participant: model_2
    role: reviewer
    inputs: [candidates.md]
    tools: [Bash, Read, Grep, Glob]
    output: verified.md
  - id: format
    participant: model_3
    role: technical-writer
    inputs: [verified.md]
    tools: [read_file, write_file]
    output: report.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [refactor, repo, analysis, claude]

name: Release notes from PRs
description: Gather merged PRs since last tag, categorize, then write user-facing release notes
input: user_prompt
steps:
  - id: gather
    model: { backend: claude, model: claude-haiku-4-5 }
    role: researcher
    inputs: [user_prompt]
    tools: [Bash]
    output: prs.md

  - id: categorize
    model: { backend: claude, model: claude-sonnet-4-6 }
    role: researcher
    inputs: [prs.md]
    tools: [Bash, Read]
    output: categories.md

  - id: write
    model: { backend: claude, model: claude-opus-4-7 }
    role: technical-writer
    inputs: [prs.md, categories.md]
    tools: [Read]
    output: notes.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [release, prs, repo, claude]

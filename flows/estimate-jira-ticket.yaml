name: Estimate Jira ticket
description: Read a Jira key + repo, propose story points and risks
input: user_prompt
steps:
  - id: research
    model: { backend: claude, model: claude-sonnet-4-6 }
    role: researcher
    inputs: [user_prompt]
    tools: [Read, Grep, Glob, mcp:atlassian]
    output: research.md
  - id: plan
    model: { backend: claude, model: claude-opus-4-7 }
    role: planner
    inputs: [user_prompt, research.md]
    tools: [Read, Grep, Glob]
    output: estimate.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [planning, tickets, mcp-jira, claude]

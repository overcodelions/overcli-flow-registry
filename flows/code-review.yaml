name: "Code Review"
description: "Survey the diff, review for bugs and security issues in parallel, adversarially verify findings, then format a final report"
input: user_prompt
default_prompt: "Review the current branch's changes for correctness and security issues."
participants:
  - id: primary
    name: Claude sonnet 4 6
    backend: claude
    model: claude-sonnet-4-6
    kind: primary
  - id: model_2
    name: Claude opus 4 7
    backend: claude
    model: claude-opus-4-7
  - id: model_3
    name: Claude haiku 4 5
    backend: claude
    model: claude-haiku-4-5
steps:
  - id: survey
    participant: primary
    role: researcher
    inputs: [user_prompt]
    tools: [Read, Grep, Glob]
    output: survey.md
  - id: review-correctness
    participant: model_2
    role: code-reviewer
    inputs: [user_prompt, survey.md]
    tools: [Read, Grep, Glob, Bash]
    output: correctness.md
  - id: review-security
    participant: model_2
    role: security-reviewer
    inputs: [user_prompt, survey.md]
    tools: [Read, Grep, Glob]
    output: security.md
  - id: verify
    participant: model_2
    role: adversarial-reviewer
    inputs: [user_prompt, correctness.md, security.md]
    tools: [Read, Grep, Glob, Bash]
    output: verified.md
  - id: format
    participant: model_3
    role: technical-writer
    inputs: [verified.md]
    tools: [read_file, write_file]
    output: review.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [review, quality, claude]

name: "Terraform plan review"
description: "Parse the plan, assess blast radius and rollback, then format a risk-ranked report"
input: user_prompt
default_prompt: |-
  Review this Terraform plan:

  <paste plan output here>
participants:
  - id: primary
    name: Claude sonnet 4 6
    backend: claude
    model: claude-sonnet-4-6
    kind: primary
  - id: model_2
    name: Claude opus 4 7
    backend: claude
    model: claude-opus-4-7
  - id: model_3
    name: Claude haiku 4 5
    backend: claude
    model: claude-haiku-4-5
steps:
  - id: parse
    participant: primary
    role: researcher
    inputs: [user_prompt]
    tools: [Read, Grep]
    output: parsed.md
  - id: blast-radius
    participant: model_2
    role: reviewer
    inputs: [parsed.md]
    tools: [Read, Grep, Glob]
    output: risk.md
  - id: format
    participant: model_3
    role: technical-writer
    inputs: [risk.md]
    tools: [read_file, write_file]
    output: review.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [review, infra, devops, claude]

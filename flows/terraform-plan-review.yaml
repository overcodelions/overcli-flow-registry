name: Terraform plan review
description: Parse the plan, assess blast radius and rollback, then format a risk-ranked report
input: user_prompt
steps:
  - id: parse
    model: { backend: claude, model: claude-sonnet-4-6 }
    role: researcher
    inputs: [user_prompt]
    tools: [Read, Grep]
    output: parsed.md

  - id: blast-radius
    model: { backend: claude, model: claude-opus-4-7 }
    role: reviewer
    inputs: [parsed.md]
    tools: [Read, Grep, Glob]
    output: risk.md

  - id: format
    model: { backend: claude, model: claude-haiku-4-5 }
    role: technical-writer
    inputs: [risk.md]
    tools: []
    output: review.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [review, infra, devops, claude]

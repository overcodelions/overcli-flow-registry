name: Sprint retrospective
description: Pull sprint tickets, analyze wins/blockers/themes, then draft a retro doc
input: user_prompt
steps:
  - id: fetch
    model: { backend: claude, model: claude-haiku-4-5 }
    role: researcher
    inputs: [user_prompt]
    tools: [mcp:atlassian]
    output: tickets.md

  - id: analyze
    model: { backend: claude, model: claude-opus-4-7 }
    role: researcher
    inputs: [tickets.md]
    tools: [mcp:atlassian]
    output: analysis.md

  - id: draft
    model: { backend: claude, model: claude-sonnet-4-6 }
    role: technical-writer
    inputs: [tickets.md, analysis.md]
    tools: []
    output: retro.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [analysis, tickets, mcp-jira, claude]

name: "Productboard feature → Jira tickets"
description: "Read a Productboard feature URL or description and create a Jira epic with implementation tickets"
input: user_prompt
default_prompt: |-
  Convert this Productboard feature into Jira tickets:

  <paste Productboard URL here>
participants:
  - id: primary
    name: Primary
    backend: claude
    model: claude-opus-4-7
    kind: primary
steps:
  - id: read
    participant: primary
    role: researcher
    inputs: [user_prompt]
    tools: [WebFetch]
    output: feature.md
  - id: tickets
    participant: primary
    role: planner
    inputs: [feature.md]
    tools: [mcp:atlassian]
    output: tickets.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [planning, roadmap, productboard, mcp-jira, claude]

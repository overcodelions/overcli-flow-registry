name: "Productboard feature → Jira tickets"
description: Fetch the Productboard feature, analyze scope, design epic + tickets, then create them in Jira
input: user_prompt
steps:
  - id: fetch
    model: { backend: claude, model: claude-haiku-4-5 }
    role: researcher
    inputs: [user_prompt]
    tools: [WebFetch]
    output: feature.md

  - id: analyze
    model: { backend: claude, model: claude-opus-4-7 }
    role: planner
    inputs: [feature.md]
    tools: [Read, Grep, Glob]
    output: analysis.md

  - id: design-tickets
    model: { backend: claude, model: claude-opus-4-7 }
    role: planner
    inputs: [feature.md, analysis.md]
    tools: [Read, Grep, Glob]
    output: tickets-draft.md

  - id: create
    model: { backend: claude, model: claude-haiku-4-5 }
    role: shipper
    inputs: [tickets-draft.md]
    tools: [mcp:atlassian]
    pause_before: true
    output: tickets.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [planning, roadmap, productboard, mcp-jira, claude]

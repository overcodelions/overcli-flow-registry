name: Triage GitHub issue
description: Fetch the issue, explore the repo, diagnose, then propose a resolution + labels
input: user_prompt
steps:
  - id: fetch
    model: { backend: claude, model: claude-haiku-4-5 }
    role: researcher
    inputs: [user_prompt]
    tools: [Bash, WebFetch]
    output: issue.md

  - id: explore
    model: { backend: claude, model: claude-sonnet-4-6 }
    role: researcher
    inputs: [issue.md]
    tools: [Read, Grep, Glob, Bash]
    output: research.md

  - id: diagnose
    model: { backend: claude, model: claude-opus-4-7 }
    role: debugger
    inputs: [issue.md, research.md]
    tools: [Read, Grep, Glob, Bash]
    output: diagnosis.md

  - id: propose
    model: { backend: claude, model: claude-sonnet-4-6 }
    role: technical-writer
    inputs: [issue.md, diagnosis.md]
    tools: []
    output: triage.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [triage, issues, repo, claude]

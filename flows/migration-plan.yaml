name: "Data migration plan"
description: "Survey current schema + scale, design an online migration with rollback, draft scripts, then review for safety"
input: user_prompt
default_prompt: |-
  Plan a data migration:

  <describe the migration here>
participants:
  - id: primary
    name: Claude sonnet 4 6
    backend: claude
    model: claude-sonnet-4-6
    kind: primary
  - id: model_2
    name: Claude opus 4 7
    backend: claude
    model: claude-opus-4-7
  - id: model_3
    name: codex:gpt-5.4-mini
    backend: codex
    model: gpt-5.4-mini
steps:
  - id: survey
    participant: primary
    role: researcher
    inputs: [user_prompt]
    tools: [Read, Grep, Glob, Bash]
    output: survey.md
  - id: design
    participant: model_2
    role: planner
    inputs: [user_prompt, survey.md]
    tools: [Read, Grep, Glob]
    output: design.md
  - id: scripts
    participant: model_3
    role: implementer
    inputs: [design.md]
    tools: [read_file, write_file, edit_file]
    permission_mode: acceptEdits
    output: scripts.md
  - id: review
    participant: model_2
    role: reviewer
    inputs: [design.md, scripts.md]
    tools: [Read, Grep, Glob]
    output: plan.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [migration, data, planning, claude, codex]

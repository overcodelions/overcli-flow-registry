name: "Triage customer feedback"
description: "Read customer feedback (email/transcript/blob), search Jira for duplicates, propose a new ticket or comment"
input: user_prompt
default_prompt: |-
  Triage this customer feedback:

  <paste feedback here>
participants:
  - id: primary
    name: Primary
    backend: claude
    model: claude-sonnet-4-6
    kind: primary
steps:
  - id: triage
    participant: primary
    role: researcher
    inputs: [user_prompt]
    tools: [mcp:atlassian, WebFetch]
    output: triage.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [triage, feedback, tickets, mcp-jira, claude]

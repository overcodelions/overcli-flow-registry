name: "Generate Documentation"
description: "Survey code, design a doc outline, draft each section, then polish for accuracy and prose"
input: user_prompt
default_prompt: "Generate developer documentation for this codebase."
participants:
  - id: primary
    name: Claude sonnet 4 6
    backend: claude
    model: claude-sonnet-4-6
    kind: primary
  - id: model_2
    name: Claude opus 4 7
    backend: claude
    model: claude-opus-4-7
  - id: model_3
    name: codex:gpt-5.4-mini
    backend: codex
    model: gpt-5.4-mini
steps:
  - id: survey
    participant: primary
    role: code-reader
    inputs: [user_prompt]
    tools: [Read, Grep, Glob]
    output: code_summary.md
  - id: outline
    participant: model_2
    role: planner
    inputs: [code_summary.md]
    tools: [Read, Grep, Glob]
    output: outline.md
  - id: draft
    participant: model_3
    role: technical-writer
    inputs: [code_summary.md, outline.md]
    tools: [read_file, list_dir, grep, write_file]
    permission_mode: acceptEdits
    output: draft.md
  - id: polish
    participant: model_2
    role: editor
    inputs: [outline.md, draft.md]
    tools: [Read, Grep, Glob]
    output: docs.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [documentation, docs, repo, claude, codex]

name: Generate Documentation
description: Survey code, design a doc outline, draft each section, then polish for accuracy and prose
input: file_paths
steps:
  - id: survey
    model: { backend: claude, model: claude-sonnet-4-6 }
    role: code-reader
    inputs: [file_paths]
    tools: [Read, Grep, Glob]
    output: code_summary.md

  - id: outline
    model: { backend: claude, model: claude-opus-4-7 }
    role: planner
    inputs: [code_summary.md]
    tools: [Read, Grep, Glob]
    output: outline.md

  - id: draft
    model: { backend: codex, model: gpt-5.4-mini }
    role: technical-writer
    inputs: [code_summary.md, outline.md]
    tools: [read_file, list_dir, grep, write_file]
    permission_mode: acceptEdits
    output: draft.md

  - id: polish
    model: { backend: claude, model: claude-opus-4-7 }
    role: editor
    inputs: [outline.md, draft.md]
    tools: [Read, Grep, Glob]
    output: docs.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [documentation, docs, repo, claude, codex]

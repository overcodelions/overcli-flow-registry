name: "License audit"
description: "Inventory dep licenses + repo LICENSE files, analyze for conflicts, then format an audit report"
input: user_prompt
default_prompt: "Audit all project dependencies for license compliance and compatibility."
participants:
  - id: primary
    name: Claude sonnet 4 6
    backend: claude
    model: claude-sonnet-4-6
    kind: primary
  - id: model_2
    name: Claude opus 4 7
    backend: claude
    model: claude-opus-4-7
  - id: model_3
    name: Claude haiku 4 5
    backend: claude
    model: claude-haiku-4-5
steps:
  - id: inventory
    participant: primary
    role: researcher
    inputs: [user_prompt]
    tools: [Bash, Read, Glob]
    output: inventory.md
  - id: analyze
    participant: model_2
    role: reviewer
    inputs: [inventory.md]
    tools: [Read, WebFetch]
    output: analysis.md
  - id: format
    participant: model_3
    role: technical-writer
    inputs: [analysis.md]
    tools: [read_file, write_file]
    output: audit.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [operations, security, devops, claude]

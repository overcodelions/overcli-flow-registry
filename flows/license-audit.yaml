name: License audit
description: Inventory dep licenses + repo LICENSE files, analyze for conflicts, then format an audit report
input: user_prompt
steps:
  - id: inventory
    model: { backend: claude, model: claude-sonnet-4-6 }
    role: researcher
    inputs: [user_prompt]
    tools: [Bash, Read, Glob]
    output: inventory.md

  - id: analyze
    model: { backend: claude, model: claude-opus-4-7 }
    role: reviewer
    inputs: [inventory.md]
    tools: [Read, WebFetch]
    output: analysis.md

  - id: format
    model: { backend: claude, model: claude-haiku-4-5 }
    role: technical-writer
    inputs: [analysis.md]
    tools: []
    output: audit.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [operations, security, devops, claude]

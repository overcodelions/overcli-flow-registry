name: "Spec → Jira tickets"
description: "Fetch a Confluence spec, break it into an epic + stories, draft tickets, then create them"
input: user_prompt
default_prompt: |-
  Break this spec into implementation tickets:

  <paste spec text or Confluence URL here>
participants:
  - id: primary
    name: Claude haiku 4 5
    backend: claude
    model: claude-haiku-4-5
    kind: primary
  - id: model_2
    name: Claude opus 4 7
    backend: claude
    model: claude-opus-4-7
  - id: model_3
    name: Claude sonnet 4 6
    backend: claude
    model: claude-sonnet-4-6
steps:
  - id: fetch
    participant: primary
    role: researcher
    inputs: [user_prompt]
    tools: [mcp:atlassian, WebFetch]
    output: spec.md
  - id: breakdown
    participant: model_2
    role: planner
    inputs: [spec.md]
    tools: [Read, Grep, Glob]
    output: breakdown.md
  - id: draft
    participant: model_3
    role: technical-writer
    inputs: [spec.md, breakdown.md]
    tools: [read_file, write_file]
    output: tickets-draft.md
  - id: create
    participant: primary
    role: shipper
    inputs: [tickets-draft.md]
    tools: [mcp:atlassian]
    pause_before: true
    output: tickets.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [planning, confluence, mcp-jira, mcp-confluence, claude]

name: Jira ticket to PR
description: Fetch the ticket, plan, implement, review with auto-bounce, then open a PR
input: user_prompt
steps:
  - id: fetch
    model: { backend: claude, model: claude-haiku-4-5 }
    role: researcher
    inputs: [user_prompt]
    tools: [mcp:atlassian]
    output: ticket.md

  - id: plan
    model: { backend: claude, model: claude-opus-4-7 }
    role: planner
    inputs: [ticket.md]
    tools: [Read, Grep, Glob]
    output: plan.md

  - id: build
    model: { backend: codex, model: gpt-5.4-mini }
    role: implementer
    inputs: [plan.md]
    tools: [read_file, list_dir, grep, write_file, edit_file]
    permission_mode: acceptEdits
    output: diff

  - id: review
    model: { backend: claude, model: claude-opus-4-7 }
    role: reviewer
    inputs: [plan.md, diff]
    tools: [Read, Grep, Glob, Bash]
    on_fail:
      action: goto
      target: build
      max_retries: 2
    output: review.md

  - id: ship
    model: { backend: claude, model: claude-sonnet-4-6 }
    role: shipper
    inputs: [plan.md, diff, review.md]
    tools: [Bash]
    pause_before: true
    output: pr_url
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [tickets, implementation, mcp-jira, claude, codex]

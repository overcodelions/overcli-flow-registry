name: "Publish status to Confluence"
description: "Pull recent Jira activity, summarize progress + blockers, draft a Confluence page with narrative flow, then publish"
input: user_prompt
default_prompt: "Create a status page summarizing project progress, completed work, and blockers for this week."
participants:
  - id: primary
    name: Claude sonnet 4 6
    backend: claude
    model: claude-sonnet-4-6
    kind: primary
  - id: model_2
    name: Claude opus 4 7
    backend: claude
    model: claude-opus-4-7
  - id: model_3
    name: Claude haiku 4 5
    backend: claude
    model: claude-haiku-4-5
steps:
  - id: fetch
    participant: primary
    role: researcher
    inputs: [user_prompt]
    tools: [mcp:atlassian]
    output: activity.md
  - id: summarize
    participant: model_2
    role: planner
    inputs: [user_prompt, activity.md]
    tools: [Read, Grep, Glob]
    output: summary.md
  - id: draft
    participant: primary
    role: technical-writer
    inputs: [summary.md]
    tools: [read_file, write_file]
    output: page.md
  - id: publish
    participant: model_3
    role: shipper
    inputs: [page.md]
    tools: [mcp:atlassian]
    pause_before: true
    output: url.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [communication, confluence, mcp-confluence, claude, codex]

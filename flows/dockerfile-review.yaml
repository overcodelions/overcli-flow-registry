name: "Dockerfile review"
description: "Read the Dockerfile and context, review for size/security/cache issues, then draft concrete fixes"
input: user_prompt
default_prompt: "Review the Dockerfile(s) in this repo for correctness, security, and image size."
participants:
  - id: primary
    name: Claude haiku 4 5
    backend: claude
    model: claude-haiku-4-5
    kind: primary
  - id: model_2
    name: Claude opus 4 7
    backend: claude
    model: claude-opus-4-7
  - id: model_3
    name: codex:gpt-5.4-mini
    backend: codex
    model: gpt-5.4-mini
steps:
  - id: read
    participant: primary
    role: researcher
    inputs: [user_prompt]
    tools: [Read, Grep, Glob]
    output: context.md
  - id: review
    participant: model_2
    role: reviewer
    inputs: [context.md]
    tools: [Read, Grep, WebFetch]
    output: findings.md
  - id: suggest-fixes
    participant: model_3
    role: implementer
    inputs: [context.md, findings.md]
    tools: [read_file, write_file, edit_file]
    permission_mode: acceptEdits
    output: review.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [review, infra, devops, claude, codex]

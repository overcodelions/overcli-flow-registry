name: "Support ticket → Jira bug"
description: Read the ticket, search Jira for duplicates, build a reproducible context, then file the bug
input: user_prompt
steps:
  - id: read
    model: { backend: claude, model: claude-haiku-4-5 }
    role: researcher
    inputs: [user_prompt]
    tools: [WebFetch, Read]
    output: ticket.md

  - id: search-dupes
    model: { backend: claude, model: claude-sonnet-4-6 }
    role: researcher
    inputs: [ticket.md]
    tools: [mcp:atlassian]
    output: dupes.md

  - id: reproduce
    model: { backend: claude, model: claude-opus-4-7 }
    role: debugger
    inputs: [ticket.md, dupes.md]
    tools: [Read, Grep, Glob, Bash]
    output: repro.md

  - id: file
    model: { backend: claude, model: claude-haiku-4-5 }
    role: shipper
    inputs: [ticket.md, dupes.md, repro.md]
    tools: [mcp:atlassian]
    pause_before: true
    output: bug.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [triage, feedback, tickets, mcp-jira, claude]

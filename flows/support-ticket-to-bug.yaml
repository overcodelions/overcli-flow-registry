name: "Support ticket → Jira bug"
description: "Convert a support ticket (Zendesk/email blob) into a well-structured Jira bug after checking for duplicates"
input: user_prompt
default_prompt: |-
  Convert this support ticket into a bug report:

  <paste support ticket here>
participants:
  - id: analyst
    name: Analyst
    backend: claude
    model: claude-sonnet-4-6
    kind: worker
  - id: author
    name: Author
    backend: claude
    model: claude-opus-4-7
    kind: primary
steps:
  - id: analyze
    participant: analyst
    role: researcher
    inputs: [user_prompt]
    tools: [WebFetch, mcp:atlassian]
    output: analysis.md
  - id: ticket
    participant: author
    role: planner
    inputs: [analysis.md]
    tools: [mcp:atlassian]
    output: ticket.md
author: { name: "Overcli", url: "https://github.com/overcodelions/overcli" }
version: 1.0.0
tags: [triage, feedback, tickets, mcp-jira, claude]
